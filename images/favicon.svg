<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="ring-back">
      <rect x="0" y="0" width="64" height="32"/>
    </clipPath>
    <clipPath id="ring-front">
      <rect x="0" y="32" width="64" height="32"/>
    </clipPath>
    <clipPath id="planet-clip">
      <circle cx="32" cy="32" r="18"/>
    </clipPath>
    <radialGradient id="shading" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0d2240" stop-opacity="0.35"/>
    </radialGradient>
  </defs>
  <!-- Ring behind planet -->
  <ellipse cx="32" cy="32" rx="30" ry="7" fill="none" stroke="#8fafc8" stroke-width="1.8" opacity="0.55" clip-path="url(#ring-back)"/>
  <!-- Planet body -->
  <circle cx="32" cy="32" r="18" fill="#4a90d9"/>
  <!-- Atmospheric bands and clouds -->
  <g clip-path="url(#planet-clip)">
    <ellipse cx="32" cy="22" rx="20" ry="2.5" fill="#3a7cc4" opacity="0.5"/>
    <ellipse cx="32" cy="40" rx="20" ry="3" fill="#3a7cc4" opacity="0.4"/>
    <!-- Patchy white clouds -->
    <ellipse cx="25" cy="26" rx="6" ry="2.5" fill="white" opacity="0.3" transform="rotate(-8 25 26)"/>
    <ellipse cx="39" cy="30" rx="5" ry="2" fill="white" opacity="0.25" transform="rotate(6 39 30)"/>
    <ellipse cx="28" cy="36" rx="7" ry="2" fill="white" opacity="0.22" transform="rotate(-4 28 36)"/>
    <ellipse cx="21" cy="32" rx="3.5" ry="1.8" fill="white" opacity="0.28"/>
    <ellipse cx="41" cy="24" rx="3" ry="1.5" fill="white" opacity="0.2"/>
    <ellipse cx="34" cy="20" rx="4" ry="1.5" fill="white" opacity="0.18" transform="rotate(10 34 20)"/>
  </g>
  <!-- Highlight and shading -->
  <circle cx="32" cy="32" r="18" fill="url(#shading)"/>
  <!-- Ring in front of planet -->
  <ellipse cx="32" cy="32" rx="30" ry="7" fill="none" stroke="#8fafc8" stroke-width="1.8" opacity="0.55" clip-path="url(#ring-front)"/>
</svg>
